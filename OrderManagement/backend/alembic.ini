# Alembic configuration file

[alembic]
# Path to migration scripts
script_location = alembic

# Prepend the current directory to the sys.path
# This allows Alembic to find app/models/ and other packages
prepend_sys_path = .

# Database URL used by Alembic. This is overridden in env.py to load settings from app.core.config
sqlalchemy.url = postgresql://postgres:postgres123@localhost:5432/order_management

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(asctime)s %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
